<!DOCTYPE html>

<html lang="en" class="h-full">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Scholaco - Sign Up</title>
 <script src="https://cdn.tailwindcss.com/3.4.17"></script>
 <link rel="preconnect" href="https://fonts.googleapis.com">
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
 <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
 <script>
   tailwind.config = {
     theme: {
       extend: {
         colors: {
           maroon: {
             50: '#fdf2f4',
             100: '#fce7eb',
             200: '#f9d0d9',
             300: '#f4a9ba',
             400: '#ec7a94',
             500: '#df4d6f',
             600: '#cb2d55',
             700: '#a91e43',
             800: '#800020',
             900: '#6b1a35',
             950: '#3d0a1a'
           }
         }
       }
     }
   }
 </script>
 <link rel="stylesheet" href="styles.css">
 <style>body { box-sizing: border-box; }</style>
</head>
<body class="h-full font-body bg-white text-gray-800 overflow-auto">

 <div class="min-h-screen hero-gradient flex items-center justify-center p-4">
  <div class="w-full max-w-md">
   <div class="text-center mb-8"><a href="index.html" class="inline-flex items-center gap-2 text-maroon-600 hover:text-maroon-800 mb-6 transition-colors">
     <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg><span>Back to Home</span> </a>
    <div class="flex items-center justify-center gap-3 mb-4">
     <div class="flex items-baseline gap-0"><img src="/images/logo-maroon.png" alt="Scholaco Logo" class="h-10 w-auto"></div>
    </div>
    <h1 class="font-display text-3xl font-bold text-gray-800">Create Your Account</h1>
    <p class="text-gray-600 mt-2">Start tracking your scholarship journey today</p>
   </div>
   <div class="glass-card rounded-2xl p-6 sm:p-8 shadow-xl">
    <form id="signup-form" class="space-y-5">
     <div class="grid grid-cols-2 gap-4">
      <div><label for="signup-first" class="block text-sm font-medium text-gray-700 mb-2">First Name</label> <input type="text" id="signup-first" class="w-full px-4 py-3 rounded-xl border border-gray-200 input-focus outline-none transition-all" placeholder="John" required>
      </div>
      <div><label for="signup-last" class="block text-sm font-medium text-gray-700 mb-2">Last Name</label> <input type="text" id="signup-last" class="w-full px-4 py-3 rounded-xl border border-gray-200 input-focus outline-none transition-all" placeholder="Doe" required>
      </div>
     </div>
     <div><label for="signup-email" class="block text-sm font-medium text-gray-700 mb-2">Email Address</label> <input type="email" id="signup-email" class="w-full px-4 py-3 rounded-xl border border-gray-200 input-focus outline-none transition-all" placeholder="you@example.com" required>
     </div>
     <div><label for="signup-password" class="block text-sm font-medium text-gray-700 mb-2">Password</label> <input type="password" id="signup-password" class="w-full px-4 py-3 rounded-xl border border-gray-200 input-focus outline-none transition-all" placeholder="••••••••" required>
      <p class="mt-1 text-xs text-gray-500">Must be at least 8 characters</p>
     </div><label class="flex items-start gap-3 cursor-pointer"> <input type="checkbox" class="w-4 h-4 mt-1 rounded border-gray-300 text-maroon-600 focus:ring-maroon-500" required> <span class="text-sm text-gray-600">I agree to the <a href="#" class="text-maroon-600 hover:underline">Terms of Service</a> and <a href="#" class="text-maroon-600 hover:underline">Privacy Policy</a></span> </label> <button type="submit" class="w-full bg-maroon-800 btn-primary py-4 rounded-xl text-white font-semibold text-lg"> Create Account </button>
    </form>
    <div class="mt-6">
     <div class="relative">
      <div class="absolute inset-0 flex items-center">
       <div class="w-full border-t border-gray-200"></div>
      </div>
      <div class="relative flex justify-center text-sm"><span class="px-4 bg-white text-gray-500">Or sign up with</span>
      </div>
     </div>
     <div class="mt-6 grid grid-cols-2 gap-4"><button class="flex items-center justify-center gap-2 px-4 py-3 border border-gray-200 rounded-xl hover:bg-gray-50 transition-colors">
       <svg class="w-5 h-5" viewbox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" /> <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" /> <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" /> <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" /></svg><span class="text-sm font-medium text-gray-700 hidden sm:inline">Google</span> </button> <button class="flex items-center justify-center gap-2 px-4 py-3 border border-gray-200 rounded-xl hover:bg-gray-50 transition-colors">
       <svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.604-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.464-1.11-1.464-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z" /></svg><span class="text-sm font-medium text-gray-700 hidden sm:inline">GitHub</span> </button>
     </div>
    </div>
    <p class="mt-8 text-center text-gray-600">Already have an account? <a href="login.html" class="text-maroon-600 hover:text-maroon-800 font-semibold">Sign in</a></p>
   </div>
  </div>
 </div>

 <script>
   document.getElementById('signup-form').addEventListener('submit', (e) => {
     e.preventDefault();
     sessionStorage.setItem('scholaco_welcome_trigger', 'true');
     sessionStorage.removeItem('scholaco_welcome_seen');
     window.location.href = 'dashboard.html';
   });
 </script>

</body>
</html>
